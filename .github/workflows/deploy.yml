name: Deploy Website

on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/resturent:v1 .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/resturent:v1

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop resturent-con || true
            docker rm resturent-con || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/resturent:v1
            docker run -d -p 3000:80 --name resturent-con ${{ secrets.DOCKER_USERNAME }}/resturent:v1
